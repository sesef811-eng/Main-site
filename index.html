<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>ونسة بزنس - المساحة الريادية الذهبية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        /* الوضع النهاري (ذهب فاتح) */
        body {
            --bg: #f5f7fc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --primary: #D4AF37;
            --primary-dark: #B8960F;
            --primary-light: #fef9e3;
            --danger: #ef4444;
            background-color: var(--bg);
            color: var(--text);
            transition: 0.3s;
        }

        /* الوضع الليلي (أسود وذهبي) */
        body.dark {
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #2c2c2c;
            --primary: #D4AF37;
            --primary-dark: #fbbf24;
            --primary-light: #2d3748;
            background-color: var(--bg);
            color: var(--text);
        }

        /* شاشة المصادقة */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0a0a0a, #010101);
            padding: 20px;
        }
        .auth-card {
            background: var(--surface);
            padding: 32px;
            border-radius: 36px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
        }
        .auth-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: 60px;
            background: transparent;
            color: var(--text);
            font-size: 1rem;
        }
        .auth-card button {
            background: var(--primary);
            color: black;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1rem;
            margin-top: 10px;
            cursor: pointer;
        }

        /* التطبيق الرئيسي */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .top-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            cursor: pointer;
        }
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            transition: transform 0.3s;
            z-index: 30;
        }
        .user-widget {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg);
            border-radius: 28px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: black;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 28px;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
        }
        .nav-item i { width: 24px; }
        .nav-item:hover, .nav-item.active {
            background: var(--bg);
            color: var(--primary);
        }
        .sidebar-footer {
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }
        #theme-toggle {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 12px;
            color: var(--text);
            cursor: pointer;
        }

        /* منطقة المحتوى */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .view {
            display: none;
            animation: fade 0.2s;
        }
        .view.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* المنشورات */
        .post-creator, .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .post-creator textarea {
            width: 100%;
            border: none;
            background: transparent;
            resize: none;
            font-size: 1rem;
            color: var(--text);
        }
        .post-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }
        .post-btn {
            background: var(--primary);
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .post-name {
            font-weight: bold;
            cursor: pointer;
        }
        .post-time {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .post-image {
            max-width: 100%;
            border-radius: 20px;
            margin: 10px 0;
        }
        .post-actions {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .like-btn, .dislike-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
        }
        .like-btn.liked { color: var(--primary); }
        .dislike-btn.disliked { color: var(--danger); }

        /* الدردشات (النظام المستقر من الملف الخارجي) */
        .chats-container {
            display: flex;
            height: calc(100vh - 130px);
            border: 1px solid var(--border);
            border-radius: 28px;
            overflow: hidden;
            background: var(--surface);
        }
        .chats-sidebar-panel {
            width: 320px;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .chats-header {
            padding: 16px;
            font-weight: 800;
            border-bottom: 1px solid var(--border);
        }
        .conversation-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            gap: 12px;
        }
        .chat-item:hover { background: var(--bg); }
        .chat-avatar {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: black;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; }
        .chat-last-msg { font-size: 0.7rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .chat-window-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-win-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages-display {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg);
        }
        .msg-bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 24px;
            word-break: break-word;
        }
        .msg-bubble.sent {
            background: var(--primary);
            color: black;
            align-self: flex-end;
            border-bottom-left-radius: 6px;
        }
        .msg-bubble.received {
            background: var(--surface);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-right-radius: 6px;
        }
        .chat-input-bar {
            display: flex;
            padding: 12px;
            gap: 12px;
            border-top: 1px solid var(--border);
        }
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 40px;
            background: var(--bg);
            color: var(--text);
        }
        .chat-send-btn {
            background: var(--primary);
            border: none;
            width: 48px;
            border-radius: 50%;
            cursor: pointer;
            color: black;
        }
        .chat-placeholder {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            text-align: center;
        }

        /* الملف الشخصي */
        .profile-header {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .profile-avatar-lg {
            width: 90px;
            height: 90px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: black;
        }
        .profile-bio {
            background: var(--surface);
            padding: 16px;
            border-radius: 24px;
            margin: 16px 0;
            border-right: 3px solid var(--primary);
        }
        .friends-scroll {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 12px 4px 20px;
            margin: 16px 0;
        }
        .friend-card {
            min-width: 85px;
            text-align: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 12px 6px;
            cursor: pointer;
        }
        .friend-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }
        .friend-avatar-sm {
            width: 55px;
            height: 55px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: black;
        }

        /* نافذة الإعدادات */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: var(--surface);
            border-radius: 32px;
            width: 90%;
            max-width: 480px;
            padding: 24px;
            border: 1px solid var(--primary);
        }
        .modal-card input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
        }
        .modal-card button {
            background: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            margin-top: 10px;
            font-weight: bold;
        }

        /* استجابة للهواتف */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                right: -100%;
                bottom: 0;
                width: 280px;
                z-index: 200;
                border-left: none;
                border-right: 2px solid var(--primary);
            }
            .sidebar.open {
                right: 0;
            }
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.5);
                z-index: 150;
                display: none;
            }
            .overlay.active {
                display: block;
            }
            .chats-sidebar-panel {
                width: 100%;
            }
            .chats-container {
                flex-direction: column;
            }
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 40px;
            border-right: 4px solid var(--primary);
            z-index: 10000;
            font-size: 0.85rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<!-- شاشة المصادقة -->
<div id="authScreen" class="auth-container">
    <div class="auth-card">
        <i class="fas fa-crown" style="font-size: 48px; color: var(--primary);"></i>
        <h2>ونسة بزنس</h2>
        <p>مساحتك الريادية.. تواصل، أصدقاء، وإنجازات</p>
        <input type="text" id="regUsername" placeholder="اسم المستخدم" style="display: none;">
        <input type="email" id="authEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="authPassword" placeholder="كلمة المرور">
        <button id="actionBtn">دخول</button>
        <div id="toggleAuthMode" style="color: var(--primary); margin-top: 15px; cursor: pointer;">جديد هنا؟ سجل حسابك مجاناً</div>
    </div>
</div>

<!-- التطبيق الرئيسي -->
<div id="appContainer" class="app-wrapper" style="display: none;">
    <div class="top-bar">
        <div class="logo" id="homeLogo">ونسة بزنس</div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <span id="currentUserName"></span>
            <button id="menuToggleBtn" style="background: transparent; border: none; font-size: 1.5rem; cursor: pointer; display: none;"><i class="fas fa-bars"></i></button>
            <button id="logoutBtn" style="background: transparent; border: 1px solid var(--primary); border-radius: 40px; padding: 6px 14px;">خروج</button>
        </div>
    </div>
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="user-widget">
                <div class="avatar">👤</div>
                <div><strong id="profileName"></strong><br><span style="font-size:12px;">@user</span></div>
            </div>
            <div class="nav-item active" data-view="home"><i class="fas fa-home"></i> الرئيسية</div>
            <div class="nav-item" data-view="chats"><i class="fas fa-comments"></i> دردشاتي</div>
            <div class="nav-item" data-view="profile"><i class="fas fa-user"></i> ملفي الشخصي</div>
            <div class="nav-item" data-view="settings"><i class="fas fa-cog"></i> الإعدادات</div>
            <div class="sidebar-footer">
                <button id="theme-toggle">🌙 الوضع الليلي</button>
            </div>
        </div>
        <div class="overlay" id="overlay"></div>
        <div class="content-area">
            <!-- الرئيسية -->
            <div id="homeView" class="view active">
                <div class="post-creator">
                    <textarea id="postContent" rows="3" placeholder="ماذا تشارك اليوم؟"></textarea>
                    <input type="text" id="postImageUrl" placeholder="رابط صورة (فيس بوك فقط)" style="width:100%; margin:10px 0; padding:10px; border-radius:40px;">
                    <div class="post-options">
                        <span id="charCounter">0 / 200</span>
                        <button class="post-btn" id="publishPostBtn">نشر</button>
                    </div>
                </div>
                <div id="postsFeed"></div>
            </div>

            <!-- الدردشات (نظام مستقر) -->
            <div id="chatsView" class="view">
                <div class="chats-container">
                    <div class="chats-sidebar-panel">
                        <div class="chats-header">💬 محادثاتي</div>
                        <div id="conversationsList" class="conversation-list"></div>
                    </div>
                    <div id="chatWindowPanel" class="chat-window-panel" style="display: none;">
                        <div class="chat-win-header">
                            <span id="chatPartnerName"></span>
                            <span id="backToChatsBtn" style="cursor: pointer; color: var(--primary);">↩️ المحادثات</span>
                        </div>
                        <div id="messagesDisplay" class="messages-display"></div>
                        <div class="chat-input-bar">
                            <input type="text" id="chatInput" class="chat-input" placeholder="اكتب رسالتك...">
                            <button id="chatSendBtn" class="chat-send-btn"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                    <div id="chatPlaceholder" class="chat-placeholder">
                        <div><i class="fas fa-comments" style="font-size: 3rem; opacity: 0.5;"></i><br>✨ اختر محادثة من القائمة ✨</div>
                    </div>
                </div>
            </div>

            <!-- الملف الشخصي -->
            <div id="profileView" class="view">
                <div id="profileContent"></div>
            </div>

            <!-- الإعدادات -->
            <div id="settingsView" class="view">
                <div style="background: var(--surface); border-radius: 28px; padding: 24px;">
                    <h3>⚙️ إعدادات الحساب</h3>
                    <button id="openSettingsBtn" style="background: var(--primary); border: none; padding: 10px 20px; border-radius: 40px; margin-top: 20px;">تعديل الحساب</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, updatePassword, updateEmail, reauthenticateWithCredential, EmailAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, update, remove, serverTimestamp, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBY32Dqx4i4dDQRh95V_TLwN_ZV02BvTfQ",
        authDomain: "gosem-a2405.firebaseapp.com",
        databaseURL: "https://gosem-a2405-default-rtdb.firebaseio.com",
        projectId: "gosem-a2405",
        storageBucket: "gosem-a2405.firebasestorage.app",
        messagingSenderId: "103197633261",
        appId: "1:103197633261:web:5c09aa8b03cffa4fa2bae4"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let currentChatId = null;
    let unsubscribeMessages = null;
    let isRegisterMode = false;
    let userCache = new Map();

    // helpers
    function showToast(msg, isError = false) {
        let t = document.createElement("div"); t.className = "toast";
        t.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    function escapeHtml(str) { return (str || "").replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]); }
    async function getUserInfo(uid) {
        if (userCache.has(uid)) return userCache.get(uid);
        let snap = await get(ref(db, `users/${uid}`));
        let data = snap.val();
        if (data) userCache.set(uid, data);
        return data;
    }
    async function isUsernameUnique(username, excludeUid = null) {
        let usersSnap = await get(ref(db, "users"));
        let users = usersSnap.val() || {};
        for (let [uid, u] of Object.entries(users)) if (u.name === username && uid !== excludeUid) return false;
        return true;
    }
    function isValidImageUrl(url) {
        if (!url) return true;
        try { let u = new URL(url); let h = u.hostname.toLowerCase(); return h.includes("facebook.com") || h.includes("fbcdn.net"); } catch(e) { return false; }
    }

    // ==================== نظام الدردشة المستقر (غرفة عامة + خاصة) ====================
    const PUBLIC_ROOM_ID = "public_room";
    async function getLastMessageText(chatId) {
        try {
            let q = query(ref(db, `chats/${chatId}/messages`), orderByChild("timestamp"), limitToLast(1));
            let snap = await get(q);
            let text = "ابدأ المحادثة 💬";
            snap.forEach(s => text = s.val().text);
            return text;
        } catch(e) { return "ابدأ المحادثة 💬"; }
    }
    async function loadConversations() {
        if (!currentUser) return;
        const container = document.getElementById("conversationsList");
        container.innerHTML = "<div style='padding:20px; text-align:center;'>✨ جاري التحميل...</div>";
        try {
            let conversations = [];
            // الغرفة العامة
            const publicInfo = await get(ref(db, `chats/${PUBLIC_ROOM_ID}/info`));
            if (publicInfo.exists()) conversations.push({ id: PUBLIC_ROOM_ID, name: "✨ الغرفة العامة ✨", isPublic: true });
            // الأصدقاء
            const friendsSnap = await get(ref(db, `friends/${currentUser.uid}`));
            const friends = friendsSnap.val() || {};
            const friendIds = Object.keys(friends).filter(fid => friends[fid] === true || friends[fid]?.status === "accepted");
            for (let fid of friendIds) {
                let friend = await getUserInfo(fid);
                if (friend) {
                    let chatId = [currentUser.uid, fid].sort().join("_");
                    conversations.push({ id: chatId, name: friend.name, isPublic: false, userId: fid });
                }
            }
            if (conversations.length === 0) {
                container.innerHTML = "<div style='padding:20px; text-align:center;'>✨ لا توجد محادثات بعد، أضف أصدقاء للبدء ✨</div>";
                return;
            }
            let html = "";
            for (let conv of conversations) {
                let lastMsg = await getLastMessageText(conv.id);
                html += `
                    <div class="chat-item" data-chatid="${conv.id}" data-public="${conv.isPublic}" data-name="${conv.name}" data-userid="${conv.userId || ''}">
                        <div class="chat-avatar">${conv.name[0]}</div>
                        <div class="chat-info">
                            <div class="chat-name">${escapeHtml(conv.name)}</div>
                            <div class="chat-last-msg">${escapeHtml(lastMsg)}</div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            document.querySelectorAll(".chat-item").forEach(el => {
                el.addEventListener("click", () => {
                    const chatId = el.dataset.chatid;
                    const name = el.dataset.name;
                    const isPublic = el.dataset.public === "true";
                    const userId = el.dataset.userid;
                    openChatWindow(chatId, name, isPublic, userId);
                });
            });
        } catch(err) { console.error(err); container.innerHTML = "<div style='padding:20px; text-align:center;'>⚠️ خطأ في التحميل</div>"; }
    }

    function openChatWindow(chatId, partnerName, isPublic, targetUserId) {
        if (unsubscribeMessages) unsubscribeMessages();
        currentChatId = chatId;
        document.querySelector(".chats-sidebar-panel").style.display = "none";
        document.getElementById("chatWindowPanel").style.display = "flex";
        document.getElementById("chatPlaceholder").style.display = "none";
        document.getElementById("chatPartnerName").innerText = partnerName;
        const messagesDiv = document.getElementById("messagesDisplay");
        const msgsRef = ref(db, `chats/${chatId}/messages`);
        unsubscribeMessages = onValue(msgsRef, (snap) => {
            const msgs = snap.val() || {};
            const sorted = Object.entries(msgs).sort((a,b)=>(a[1].timestamp||0)-(b[1].timestamp||0));
            messagesDiv.innerHTML = "";
            if (sorted.length === 0) messagesDiv.innerHTML = "<div style='text-align:center; padding:20px;'>✨ ابدأ المحادثة ✨</div>";
            sorted.forEach(([key, msg]) => {
                const div = document.createElement("div");
                div.className = `msg-bubble ${msg.senderId === currentUser.uid ? "sent" : "received"}`;
                div.innerText = msg.text;
                messagesDiv.appendChild(div);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
        const sendBtn = document.getElementById("chatSendBtn");
        const input = document.getElementById("chatInput");
        const sendMessage = async () => {
            let text = input.value.trim();
            if (!text) return;
            await push(msgsRef, { senderId: currentUser.uid, text, timestamp: Date.now() });
            input.value = "";
        };
        sendBtn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === "Enter") sendMessage(); };
    }

    function closeChatWindow() {
        if (unsubscribeMessages) unsubscribeMessages();
        document.querySelector(".chats-sidebar-panel").style.display = "flex";
        document.getElementById("chatWindowPanel").style.display = "none";
        document.getElementById("chatPlaceholder").style.display = "flex";
        currentChatId = null;
        loadConversations();
    }
    document.getElementById("backToChatsBtn").addEventListener("click", closeChatWindow);

    // ==================== الأصدقاء والملف الشخصي ====================
    async function loadFriendsForProfile(uid) {
        let friendsSnap = await get(ref(db, `friends/${uid}`));
        let friendsMap = friendsSnap.val() || {};
        let friendIds = Object.keys(friendsMap).filter(fid => friendsMap[fid] === true || friendsMap[fid]?.status === "accepted");
        let html = '<div class="friends-scroll">';
        for (let fid of friendIds) {
            let f = await getUserInfo(fid);
            if (f) html += `<div class="friend-card" data-fid="${fid}"><div class="friend-avatar-sm">${f.avatar || "👤"}</div><div>${escapeHtml(f.name)}</div></div>`;
        }
        html += '</div>';
        if (friendIds.length === 0) html = "<div style='opacity:0.6; text-align:center;'>لا يوجد أصدقاء بعد</div>";
        return html;
    }
    async function showUserProfile(uid) {
        let user = await getUserInfo(uid);
        if (!user) return;
        let friendsHtml = await loadFriendsForProfile(uid);
        let isOwn = (uid === currentUser.uid);
        let container = document.getElementById("profileContent");
        container.innerHTML = `
            <div class="profile-header">
                <div class="profile-avatar-lg">${user.avatar || "👤"}</div>
                <div><h2>${escapeHtml(user.name)}</h2>${!isOwn ? '<button id="msgFromProfileBtn" style="background:var(--primary); border:none; border-radius:40px; padding:8px 16px;">مراسلة</button>' : '<button id="editBioBtn" style="background:var(--primary); border:none; border-radius:40px; padding:8px 16px;">تعديل السيرة</button>'}</div>
            </div>
            <div class="profile-bio"><strong>📝 عني:</strong><br> ${escapeHtml(user.bio || "مرحباً! أنا جديد في ونسة بزنس")}</div>
            <h3 style="margin:16px 0 8px;">👥 أصدقائي</h3>${friendsHtml}
            <h3>📝 منشورات ${isOwn ? "ي" : user.name}</h3><div id="userPostsList"></div>
        `;
        document.querySelectorAll(".friend-card").forEach(card => {
            card.addEventListener("click", () => showUserProfile(card.dataset.fid));
        });
        if (!isOwn) {
            document.getElementById("msgFromProfileBtn")?.addEventListener("click", async () => {
                let isFriend = await get(ref(db, `friends/${currentUser.uid}/${uid}`));
                if (!isFriend.exists() || (isFriend.val() !== true && isFriend.val()?.status !== "accepted")) return showToast("⚠️ يمكنك المراسلة فقط بعد أن تصبحا أصدقاء", true);
                let chatId = [currentUser.uid, uid].sort().join("_");
                let friendName = user.name;
                openChatWindow(chatId, friendName, false, uid);
                document.querySelector('.nav-item[data-view="chats"]').click();
            });
        } else {
            document.getElementById("editBioBtn")?.addEventListener("click", async () => {
                let newBio = prompt("عدل سيرتك الذاتية:", user.bio || "");
                if (newBio !== null) { await update(ref(db, `users/${uid}`), { bio: newBio }); showToast("✅ تم التحديث"); showUserProfile(uid); }
            });
        }
        let postsSnap = await get(ref(db, `posts/${uid}`));
        let posts = postsSnap.val() || {};
        let postsDiv = container.querySelector("#userPostsList");
        postsDiv.innerHTML = "";
        for (let [pid, p] of Object.entries(posts).sort((a,b)=>b[1].timestamp - a[1].timestamp)) {
            let div = document.createElement("div"); div.className = "post-card";
            div.innerHTML = `<div>${escapeHtml(p.text)}</div>${p.imageUrl ? `<img src="${escapeHtml(p.imageUrl)}" class="post-image" onclick="window.showImageModal(this.src)">` : ""}<div class="post-actions"><span><i class="fas fa-thumbs-up"></i> ${Object.keys(p.likes||{}).length}</span><span><i class="fas fa-thumbs-down"></i> ${Object.keys(p.dislikes||{}).length}</span></div>`;
            if (isOwn) div.innerHTML += `<button class="delete-post-btn" data-pid="${pid}" style="margin-top:10px; background:none; border:1px solid var(--danger); border-radius:30px; padding:4px 12px;">حذف</button>`;
            postsDiv.appendChild(div);
            if (isOwn) div.querySelector(".delete-post-btn")?.addEventListener("click", async () => { await remove(ref(db, `posts/${uid}/${pid}`)); showUserProfile(uid); });
        }
    }

    // ==================== المنشورات (الرئيسية) ====================
    async function loadFeed() {
        if (!currentUser) return;
        let friendsSnap = await get(ref(db, `friends/${currentUser.uid}`));
        let friends = friendsSnap.val() || {};
        let friendIds = Object.keys(friends).filter(fid => friends[fid] === true || friends[fid]?.status === "accepted");
        let userIds = [currentUser.uid, ...friendIds];
        let allPosts = [];
        for (let uid of userIds) {
            let postsSnap = await get(ref(db, `posts/${uid}`));
            let posts = postsSnap.val() || {};
            let userInfo = await getUserInfo(uid);
            for (let [pid, p] of Object.entries(posts)) {
                let likesCount = p.likes ? Object.keys(p.likes).length : 0;
                let dislikesCount = p.dislikes ? Object.keys(p.dislikes).length : 0;
                allPosts.push({ id: pid, uid, userName: userInfo?.name, userAvatar: userInfo?.avatar || "👤", text: p.text, imageUrl: p.imageUrl, timestamp: p.timestamp, likesCount, dislikesCount, myLike: p.likes?.[currentUser.uid] || false, myDislike: p.dislikes?.[currentUser.uid] || false });
            }
        }
        allPosts.sort((a,b) => b.timestamp - a.timestamp);
        let container = document.getElementById("postsFeed");
        container.innerHTML = "";
        for (let post of allPosts) {
            let div = document.createElement("div"); div.className = "post-card";
            div.innerHTML = `
                <div class="post-header"><div class="avatar" style="width:45px; height:45px;">${post.userAvatar}</div><div><div class="post-name" data-uid="${post.uid}">${escapeHtml(post.userName)}</div><div class="post-time">${new Date(post.timestamp).toLocaleString()}</div></div></div>
                <div>${escapeHtml(post.text)}</div>${post.imageUrl ? `<img src="${escapeHtml(post.imageUrl)}" class="post-image" onclick="window.showImageModal(this.src)">` : ""}
                <div class="post-actions"><button class="like-btn ${post.myLike ? 'liked' : ''}" data-uid="${post.uid}" data-pid="${post.id}"><i class="fas fa-thumbs-up"></i> ${post.likesCount}</button><button class="dislike-btn ${post.myDislike ? 'disliked' : ''}" data-uid="${post.uid}" data-pid="${post.id}"><i class="fas fa-thumbs-down"></i> ${post.dislikesCount}</button>${post.uid === currentUser.uid ? `<button class="delete-post-btn" data-uid="${post.uid}" data-pid="${post.id}" style="margin-right:auto;">🗑️ حذف</button>` : ""}</div>
            `;
            container.appendChild(div);
            div.querySelector(".post-name")?.addEventListener("click", () => { showUserProfile(post.uid); navigateTo("profile"); });
            div.querySelector(".like-btn")?.addEventListener("click", async () => {
                let likeRef = ref(db, `posts/${post.uid}/${post.id}/likes/${currentUser.uid}`);
                let dislikeRef = ref(db, `posts/${post.uid}/${post.id}/dislikes/${currentUser.uid}`);
                let likeSnap = await get(likeRef);
                if (likeSnap.exists()) await remove(likeRef);
                else { let disSnap = await get(dislikeRef); if (disSnap.exists()) await remove(dislikeRef); await set(likeRef, true); }
                loadFeed();
            });
            div.querySelector(".dislike-btn")?.addEventListener("click", async () => {
                let dislikeRef = ref(db, `posts/${post.uid}/${post.id}/dislikes/${currentUser.uid}`);
                let likeRef = ref(db, `posts/${post.uid}/${post.id}/likes/${currentUser.uid}`);
                let dislikeSnap = await get(dislikeRef);
                if (dislikeSnap.exists()) await remove(dislikeRef);
                else { let likeSnap = await get(likeRef); if (likeSnap.exists()) await remove(likeRef); await set(dislikeRef, true); }
                loadFeed();
            });
            if (post.uid === currentUser.uid) div.querySelector(".delete-post-btn")?.addEventListener("click", async () => { await remove(ref(db, `posts/${post.uid}/${post.id}`)); loadFeed(); });
        }
    }
    document.getElementById("publishPostBtn").onclick = async () => {
        let text = document.getElementById("postContent").value.trim();
        let img = document.getElementById("postImageUrl").value.trim();
        if (!text) return showToast("اكتب محتوى المنشور أولاً", true);
        if (img && !isValidImageUrl(img)) return showToast("الروابط مسموحة فقط من فيسبوك", true);
        await push(ref(db, `posts/${currentUser.uid}`), { text, imageUrl: img || null, timestamp: Date.now(), likes: {}, dislikes: {} });
        document.getElementById("postContent").value = ""; document.getElementById("postImageUrl").value = "";
        showToast("تم النشر بنجاح");
        if (document.querySelector(".nav-item.active").dataset.view === "home") loadFeed();
    };
    window.showImageModal = (src) => {
        let modal = document.createElement("div"); modal.className = "modal";
        modal.innerHTML = `<img src="${src}" style="max-width:90%; max-height:90%; border-radius:20px;">`;
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    };

    // ==================== إعدادات الحساب ====================
    function openSettingsModal() {
        let modal = document.createElement("div"); modal.className = "modal";
        modal.innerHTML = `<div class="modal-card"><div style="display:flex; justify-content:space-between;"><h3>إعدادات الحساب</h3><span id="closeModal" style="cursor:pointer;">✕</span></div>
            <div><label>اسم جديد</label><input id="newUsername" placeholder="الاسم الجديد"><button id="updateNameBtn">تحديث</button></div>
            <div><label>كلمة مرور جديدة</label><input id="currentPass" placeholder="كلمة المرور الحالية"><input id="newPass" placeholder="كلمة المرور الجديدة"><input id="confirmPass" placeholder="تأكيد"><button id="updatePassBtn">تحديث</button></div>
            <div><label>بريد جديد</label><input id="newEmail" placeholder="البريد الجديد"><input id="emailPass" placeholder="كلمة المرور"><button id="updateEmailBtn">تحديث</button></div>
            <div><button id="deleteAccountBtn" style="background:var(--danger); color:white;">حذف الحساب</button></div>
        </div>`;
        document.body.appendChild(modal);
        document.getElementById("closeModal").onclick = () => modal.remove();
        document.getElementById("updateNameBtn").onclick = async () => {
            let newName = document.getElementById("newUsername").value.trim();
            if (!newName) return showToast("أدخل اسماً", true);
            if (!await isUsernameUnique(newName, currentUser.uid)) return showToast("الاسم مستخدم", true);
            await updateProfile(auth.currentUser, { displayName: newName });
            await update(ref(db, `users/${currentUser.uid}`), { name: newName });
            showToast("تم التحديث"); modal.remove(); location.reload();
        };
        document.getElementById("updatePassBtn").onclick = async () => {
            let cur = document.getElementById("currentPass").value, newP = document.getElementById("newPass").value, conf = document.getElementById("confirmPass").value;
            if (!cur || !newP) return showToast("املأ الحقول", true);
            if (newP !== conf) return showToast("كلمتا المرور غير متطابقتين", true);
            try {
                let cred = EmailAuthProvider.credential(auth.currentUser.email, cur);
                await reauthenticateWithCredential(auth.currentUser, cred);
                await updatePassword(auth.currentUser, newP);
                showToast("تم التحديث"); modal.remove();
            } catch(err) { showToast(err.message, true); }
        };
        document.getElementById("updateEmailBtn").onclick = async () => {
            let newEmail = document.getElementById("newEmail").value.trim(), pass = document.getElementById("emailPass").value;
            if (!newEmail || !pass) return showToast("املأ الحقول", true);
            try {
                let cred = EmailAuthProvider.credential(auth.currentUser.email, pass);
                await reauthenticateWithCredential(auth.currentUser, cred);
                await updateEmail(auth.currentUser, newEmail);
                await update(ref(db, `users/${currentUser.uid}`), { email: newEmail });
                showToast("تم التحديث"); modal.remove();
            } catch(err) { showToast(err.message, true); }
        };
        document.getElementById("deleteAccountBtn").onclick = async () => {
            if (confirm("سيتم حذف حسابك وكل محتواك نهائياً. استمرار؟")) {
                await remove(ref(db, `users/${currentUser.uid}`));
                await remove(ref(db, `posts/${currentUser.uid}`));
                await auth.currentUser.delete();
                showToast("تم حذف الحساب"); location.reload();
            }
        };
    }

    // ==================== التنقل بين الأقسام ====================
    function navigateTo(viewId) {
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
        document.getElementById(`${viewId}View`).classList.add("active");
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
        document.querySelector(`.nav-item[data-view="${viewId}"]`).classList.add("active");
        if (viewId === "home") loadFeed();
        if (viewId === "profile") showUserProfile(currentUser.uid);
        if (viewId === "chats") { loadConversations(); closeChatWindow(); }
        if (window.innerWidth <= 768) document.getElementById("sidebar").classList.remove("open");
    }
    document.querySelectorAll(".nav-item").forEach(n => n.addEventListener("click", () => navigateTo(n.dataset.view)));
    document.getElementById("homeLogo").onclick = () => navigateTo("home");
    document.getElementById("openSettingsBtn").addEventListener("click", openSettingsModal);

    // ==================== Sidebar Toggle Mobile ====================
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const menuToggleBtn = document.getElementById("menuToggleBtn");
    if (window.innerWidth <= 768) menuToggleBtn.style.display = "block";
    menuToggleBtn.onclick = () => {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("active");
    };
    overlay.onclick = () => {
        sidebar.classList.remove("open");
        overlay.classList.remove("active");
    };

    // ==================== الوضع الليلي ====================
    function initTheme() {
        let theme = localStorage.getItem("theme");
        if (theme === "dark") document.body.classList.add("dark");
        document.getElementById("theme-toggle").onclick = () => {
            document.body.classList.toggle("dark");
            localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
        };
    }

    // ==================== المصادقة ====================
    const toggleAuth = document.getElementById("toggleAuthMode");
    const actionBtn = document.getElementById("actionBtn");
    const regUsernameInp = document.getElementById("regUsername");
    toggleAuth.onclick = () => {
        isRegisterMode = !isRegisterMode;
        if (isRegisterMode) {
            actionBtn.innerText = "إنشاء حساب جديد";
            toggleAuth.innerText = "لديك حساب؟ سجل دخول";
            regUsernameInp.style.display = "block";
        } else {
            actionBtn.innerText = "دخول";
            toggleAuth.innerText = "جديد هنا؟ سجل حسابك مجاناً";
            regUsernameInp.style.display = "none";
        }
    };
    actionBtn.onclick = async () => {
        let email = document.getElementById("authEmail").value.trim();
        let pass = document.getElementById("authPassword").value.trim();
        if (!email || !pass) return showToast("املأ البريد وكلمة المرور", true);
        if (isRegisterMode) {
            let username = regUsernameInp.value.trim();
            if (!username) return showToast("اختر اسم مستخدم", true);
            if (!await isUsernameUnique(username)) return showToast("الاسم مستخدم", true);
            try {
                let cred = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(cred.user, { displayName: username });
                await set(ref(db, `users/${cred.user.uid}`), { uid: cred.user.uid, email, name: username, avatar: "👤", bio: "مرحباً! أنا جديد في ونسة بزنس", online: true });
                showToast(`أهلاً بك ${username}`);
            } catch(e) { showToast(e.message, true); }
        } else {
            try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { showToast("بريد أو كلمة مرور غير صحيحة", true); }
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await update(ref(db, `users/${user.uid}`), { online: true, name: user.displayName });
            document.getElementById("currentUserName").innerText = user.displayName;
            document.getElementById("profileName").innerText = user.displayName;
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("appContainer").style.display = "flex";
            loadFeed(); showUserProfile(user.uid); loadConversations();
            document.getElementById("logoutBtn").onclick = async () => { await update(ref(db, `users/${user.uid}`), { online: false }); await signOut(auth); location.reload(); };
        } else {
            document.getElementById("authScreen").style.display = "flex";
            document.getElementById("appContainer").style.display = "none";
            if (unsubscribeMessages) unsubscribeMessages();
        }
    });
    initTheme();
</script>
</body>
</html>
