<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ونـسة بزنس | مساحتك الاجتماعية الريادية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #0a0a0a; color: #eef2ff; }
        .toast-msg { position: fixed; bottom: 20px; left: 20px; background: #1f1f2e; border-right: 4px solid #D4AF37; padding: 12px 20px; border-radius: 12px; z-index: 9999; font-size: 0.9rem; backdrop-filter: blur(12px); z-index: 10000; }
        .auth-container { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at 10% 20%, #0a0a0a, #010101); }
        .auth-card { background: rgba(0,0,0,0.7); backdrop-filter: blur(16px); border: 1px solid #D4AF37; border-radius: 32px; padding: 2rem; width: 450px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin: 8px 0; background: #1e1e2a; border: 1px solid #2c2c3a; border-radius: 40px; color: white; }
        .auth-card button { background: #D4AF37; border: none; padding: 10px; width: 100%; border-radius: 40px; font-weight: bold; margin-top: 12px; cursor: pointer; }
        .gold-link { color: #D4AF37; cursor: pointer; margin-top: 16px; display: inline-block; }
        .app-wrapper { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #000000cc; backdrop-filter: blur(20px); border-bottom: 1px solid #D4AF37; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .logo h2 { font-size: 1.4rem; background: linear-gradient(135deg, #D4AF37, #FFD966); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .profile-menu { position: relative; }
        .menu-icon { cursor: pointer; }
        .menu-icon span { display: block; width: 28px; height: 3px; background: #D4AF37; margin: 5px 0; border-radius: 5px; }
        .menu-dropdown { position: absolute; top: 45px; left: 0; width: 280px; background: #0f0f1a; backdrop-filter: blur(16px); border: 1px solid #D4AF37; border-radius: 20px; z-index: 2000; display: none; flex-direction: column; }
        .menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #2a2a3a; transition: 0.1s; }
        .menu-item:hover { background: #1f1f2e; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 330px; background: #050505dd; backdrop-filter: blur(10px); border-left: 1px solid rgba(212,175,55,0.3); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .search-box { background: #1a1a24; border-radius: 40px; padding: 8px 16px; display: flex; gap: 8px; }
        .search-box input { flex: 1; background: none; border: none; color: white; outline: none; }
        .section-title { color: #D4AF37; font-weight: bold; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .friend-item, .request-item, .search-result-item, .chat-conversation-item { background: #12121a; margin: 6px 0; padding: 10px 12px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; gap: 8px; cursor: pointer; transition: 0.1s; }
        .friend-item:hover, .chat-conversation-item:hover { background: #1f1f2e; border-right: 3px solid #D4AF37; }
        .request-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .request-actions button, .friend-action-profile { background: #D4AF37; border: none; border-radius: 20px; padding: 4px 12px; cursor: pointer; font-weight: bold; }
        .right-panel { flex: 1; display: flex; flex-direction: column; background: #000000aa; }
        .tabs-header { display: flex; border-bottom: 1px solid rgba(212, 175, 55, 0.4); background: #0c0c12; overflow-x: auto; }
        .tab-btn { padding: 12px 16px; background: none; border: none; color: #ccd6f6; font-weight: bold; font-size: 0.9rem; cursor: pointer; white-space: nowrap; transition: 0.1s; }
        .tab-btn.active { color: #D4AF37; border-bottom: 3px solid #D4AF37; background: rgba(212,175,55,0.1); }
        .tab-content { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .tab-content.active-tab { display: flex; }
        .posts-feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .create-post-card { background: #12121a; border-radius: 28px; padding: 16px; border: 1px solid rgba(212,175,55,0.3); }
        .create-post-card textarea, .create-post-card input { width: 100%; background: #1e1e2a; border: 1px solid #2c2c3a; border-radius: 24px; padding: 12px; color: white; margin-bottom: 8px; resize: vertical; }
        .post-btn { background: #D4AF37; border: none; padding: 8px 20px; border-radius: 40px; margin-top: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .post-item { background: #0a0a12; border-radius: 28px; padding: 16px; border: 1px solid #2a2a35; margin-bottom: 16px; transition: 0.1s; }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-avatar { width: 45px; height: 45px; background: #D4AF37; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; font-size: 1.3rem; }
        .post-name { font-weight: bold; cursor: pointer; }
        .post-name:hover { text-decoration: underline; color: #D4AF37; }
        .post-time { font-size: 0.7rem; opacity: 0.6; margin-right: auto; }
        .post-text { margin: 12px 0; line-height: 1.5; word-break: break-word; }
        .post-image { max-width: 100%; max-height: 300px; border-radius: 20px; margin: 8px 0; cursor: pointer; object-fit: contain; background: #0a0a0a; }
        .post-actions { display: flex; gap: 20px; margin-top: 8px; flex-wrap: wrap; }
        .like-btn, .dislike-btn { background: none; border: none; color: #ccd6f6; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 30px; transition: 0.1s; }
        .like-btn.liked { color: #D4AF37; }
        .dislike-btn.disliked { color: #ff5e5e; }
        .profile-card { background: #0c0c12; border-radius: 28px; padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; }
        .profile-card:hover { background: #1a1a2a; }
        .profile-avatar { width: 50px; height: 50px; background: #D4AF37; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #000; }
        .edit-profile { background: #D4AF37; border: none; border-radius: 20px; padding: 4px 12px; cursor: pointer; margin-top: 6px; }
        .logout-btn { background: transparent; border: 1px solid #D4AF37; padding: 6px 16px; border-radius: 30px; color: #D4AF37; cursor: pointer; transition: 0.2s; }
        .logout-btn:hover { background: #D4AF37; color: #000; }
        .green-dot { width: 10px; height: 10px; background: #39FF14; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 4px #39FF14; }
        .gray-dot { background: #555; box-shadow: none; }
        .profile-header { background: linear-gradient(135deg, #1a1a2a, #0a0a12); border-radius: 28px; padding: 20px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .profile-bio { background: #12121a; border-radius: 20px; padding: 12px; margin: 12px 0; border-right: 3px solid #D4AF37; }
        /* قسم الأصدقاء الأفقي */
        .friends-horizontal-scroll { display: flex; gap: 16px; overflow-x: auto; padding: 12px 4px 20px 4px; margin: 12px 0; scrollbar-width: thin; }
        .friend-card { min-width: 85px; text-align: center; cursor: pointer; transition: 0.2s; background: #12121a; border-radius: 24px; padding: 12px 6px; border: 1px solid rgba(212,175,55,0.2); }
        .friend-card:hover { background: #1f1f2e; transform: translateY(-3px); border-color: #D4AF37; }
        .friend-card-avatar { width: 60px; height: 60px; background: #D4AF37; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 1.8rem; color: #000; }
        .friend-card-name { font-size: 0.8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70px; }
        .modal-settings, .image-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .settings-card { background: #0f0f1a; border: 1px solid #D4AF37; border-radius: 32px; width: 500px; max-width: 90%; padding: 24px; max-height: 80vh; overflow-y: auto; }
        .chat-header { padding: 12px; background: #0c0c12; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #D4AF37; }
        .back-to-chats { cursor: pointer; color: #D4AF37; }
        .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message-bubble { max-width: 70%; padding: 8px 14px; border-radius: 22px; word-break: break-word; }
        .my-message { background: #D4AF37; color: #000; align-self: flex-end; border-bottom-left-radius: 4px; }
        .their-message { background: #1f2a2f; border: 0.5px solid #D4AF37; align-self: flex-start; border-bottom-right-radius: 4px; }
        .chat-input-area { padding: 12px; background: #070707; display: flex; gap: 12px; border-top: 1px solid #D4AF37; }
        .chat-input-area input { flex: 1; background: #1a1a24; border: none; border-radius: 40px; padding: 10px; color: white; outline: none; }
        .chat-input-area button { background: #D4AF37; border: none; width: 44px; border-radius: 40px; cursor: pointer; }
        .delete-post { background: none; border: none; color: #ff5e5e; cursor: pointer; margin-right: auto; padding: 4px 8px; border-radius: 30px; }
        .conversation-last-msg { font-size: 0.7rem; opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        @media (max-width: 700px) { .sidebar { width: 260px; } .settings-card { width: 95%; } .friend-card { min-width: 70px; } .friend-card-avatar { width: 50px; height: 50px; font-size: 1.5rem; } }
    </style>
</head>
<body>

<div id="authScreen" class="auth-container">
    <div class="auth-card">
        <i class="fas fa-crown" style="font-size: 48px; color: #D4AF37;"></i>
        <h2>ونـسة بزنس</h2>
        <p>مساحتك الريادية.. تواصل، أصدقاء، وإنجازات</p>
        <input type="text" id="regUsername" placeholder="اسم المستخدم (ظاهر للجميع)">
        <input type="email" id="authEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="authPassword" placeholder="كلمة المرور">
        <button id="actionBtn">دخول</button>
        <div class="gold-link" id="toggleAuthMode">جديد هنا؟ سجل حسابك مجاناً</div>
    </div>
</div>

<div id="appContainer" class="app-wrapper">
    <div class="top-bar">
        <div class="logo" id="homeLogo"><i class="fas fa-home" style="color:#D4AF37;"></i><h2>ونـسة بزنس</h2></div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div class="profile-menu">
                <div class="menu-icon" id="menuIcon"><span></span><span></span><span></span></div>
                <div id="menuDropdown" class="menu-dropdown">
                    <div class="menu-item" id="settingsMenuItem"><i class="fas fa-cog"></i> الإعدادات الشخصية</div>
                    <div class="menu-item" id="privacyMenuItem"><i class="fas fa-lock"></i> سياسة الخصوصية</div>
                    <div class="menu-item" id="helpMenuItem"><i class="fas fa-question-circle"></i> المساعدة والدعم</div>
                </div>
            </div>
            <span id="currentUserName"></span>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>
    <div class="main-layout">
        <div class="sidebar">
            <div class="search-box"><i class="fas fa-search" style="color:#D4AF37;"></i><input id="searchUserInput" placeholder="ابحث عن أصدقاء جدد..."></div>
            <div id="searchResults"></div>
            <div class="section-title">📨 طلبات الصداقة</div><div id="friendRequestsList"></div>
            <div class="section-title">👥 أصدقائي</div><div id="friendsList"></div>
            <div class="profile-card" id="sidebarProfileBtn">
                <div class="profile-avatar" id="profileAvatar">👤</div>
                <div><strong id="profileName"></strong><br><span style="font-size:12px;">عرض ملفي الشخصي</span></div>
            </div>
        </div>
        <div class="right-panel">
            <div class="tabs-header">
                <button class="tab-btn active" data-tab="feedTab"><i class="fas fa-newspaper"></i> الرئيسية</button>
                <button class="tab-btn" data-tab="profileTab"><i class="fas fa-user-circle"></i> ملفي الشخصي</button>
                <button class="tab-btn" data-tab="chatsTab"><i class="fas fa-comments"></i> دردشاتي</button>
            </div>
            <div id="feedTab" class="tab-content active-tab">
                <div class="posts-feed">
                    <div class="create-post-card">
                        <textarea id="globalPostContent" rows="2" placeholder="ماذا تشارك اليوم؟"></textarea>
                        <input type="text" id="globalPostImageUrl" placeholder="رابط صورة (مسموح فقط من فيسبوك)">
                        <button class="post-btn" id="publishGlobalPost"><i class="fas fa-pen-fancy"></i> انشر المنشور</button>
                    </div>
                    <div id="allFeedPosts"></div>
                </div>
            </div>
            <div id="profileTab" class="tab-content"><div class="posts-feed" id="profileContainer"></div></div>
            <div id="chatsTab" class="tab-content">
                <div id="chatsListContainer" style="flex:1; overflow-y: auto; padding: 16px;"></div>
                <div id="activeChatView" style="display: none; flex-direction: column; height: 100%;">
                    <div class="chat-header"><span id="activeChatFriendName"></span><span class="back-to-chats" id="backToChatsList"><i class="fas fa-arrow-right"></i> المحادثات</span></div>
                    <div id="privateMessagesContainer" style="flex:1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;"></div>
                    <div class="chat-input-area" id="privateChatInputArea"><input id="privateMsgInput" placeholder="اكتب رسالتك..."><button id="sendPrivateMsgBtn"><i class="fas fa-paper-plane"></i></button></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, updatePassword, updateEmail, reauthenticateWithCredential, EmailAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, update, remove, serverTimestamp, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBY32Dqx4i4dDQRh95V_TLwN_ZV02BvTfQ",
        authDomain: "gosem-a2405.firebaseapp.com",
        databaseURL: "https://gosem-a2405-default-rtdb.firebaseio.com",
        projectId: "gosem-a2405",
        storageBucket: "gosem-a2405.firebasestorage.app",
        messagingSenderId: "103197633261",
        appId: "1:103197633261:web:5c09aa8b03cffa4fa2bae4"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let currentChatFriendId = null;
    let unsubscribeCurrentChat = null;

    function showToast(msg, err = false) { let t = document.createElement('div'); t.className = 'toast-msg'; t.innerHTML = `<i class="fas ${err ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${escapeHtml(msg)}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }
    async function getUserInfo(uid) { const snap = await get(ref(db, `users/${uid}`)); return snap.val(); }
    async function isUsernameUnique(username, excludeUid = null) {
        const usersSnap = await get(ref(db, 'users'));
        const users = usersSnap.val() || {};
        for (let [uid, u] of Object.entries(users)) if (u.name === username && uid !== excludeUid) return false;
        return true;
    }
    function isValidImageUrl(url) {
        if (!url) return true;
        try {
            let u = new URL(url);
            let host = u.hostname.toLowerCase();
            return host.includes('facebook.com') || host.includes('fbcdn.net');
        } catch(e) { return false; }
    }

    // إعدادات الحساب
    function openSettingsModal() {
        const modal = document.createElement('div'); modal.className = 'modal-settings';
        modal.innerHTML = `<div class="settings-card"><span class="close-settings">&times;</span><h3><i class="fas fa-user-cog"></i> إعدادات حسابي</h3>
            <div style="margin:20px 0;"><label>تغيير اسم المستخدم</label><input type="text" id="newUsername" placeholder="الاسم الجديد"><button id="updateUsernameBtn">تحديث الاسم</button></div>
            <div style="margin:20px 0;"><label>تغيير كلمة المرور</label><input type="password" id="currentPass" placeholder="كلمة المرور الحالية"><input type="password" id="newPass" placeholder="كلمة المرور الجديدة"><input type="password" id="confirmPass" placeholder="تأكيد كلمة المرور"><button id="updatePasswordBtn">تحديث كلمة المرور</button></div>
            <div style="margin:20px 0;"><label>تغيير البريد الإلكتروني</label><input type="email" id="newEmail" placeholder="البريد الجديد"><input type="password" id="emailPassConfirm" placeholder="كلمة المرور الحالية"><button id="updateEmailBtn">تحديث البريد</button></div>
            <div class="gold-link" id="deleteAccountBtn" style="color:#ff5e5e; text-align:center; margin-top:16px;">⚠️ حذف حسابي نهائياً</div>
        </div>`;
        document.body.appendChild(modal);
        modal.querySelector('.close-settings').onclick = () => modal.remove();
        document.getElementById('updateUsernameBtn').onclick = async () => {
            const newName = document.getElementById('newUsername').value.trim();
            if (!newName) return showToast('أدخل اسماً جديداً', true);
            if (!await isUsernameUnique(newName, currentUser.uid)) return showToast('⚠️ هذا الاسم مستخدم بالفعل!', true);
            await updateProfile(auth.currentUser, { displayName: newName });
            await update(ref(db, `users/${currentUser.uid}`), { name: newName });
            showToast('✅ تم تحديث اسم المستخدم'); modal.remove(); location.reload();
        };
        document.getElementById('updatePasswordBtn').onclick = async () => {
            const curPass = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;
            if (!curPass || !newPass) return showToast('املأ جميع الحقول', true);
            if (newPass !== confirm) return showToast('كلمتا المرور غير متطابقتين', true);
            try {
                const credential = EmailAuthProvider.credential(auth.currentUser.email, curPass);
                await reauthenticateWithCredential(auth.currentUser, credential);
                await updatePassword(auth.currentUser, newPass);
                showToast('✅ تم تحديث كلمة المرور'); modal.remove();
            } catch (err) { showToast(err.message, true); }
        };
        document.getElementById('updateEmailBtn').onclick = async () => {
            const newEmail = document.getElementById('newEmail').value.trim();
            const password = document.getElementById('emailPassConfirm').value;
            if (!newEmail || !password) return showToast('املأ الحقول', true);
            try {
                const credential = EmailAuthProvider.credential(auth.currentUser.email, password);
                await reauthenticateWithCredential(auth.currentUser, credential);
                await updateEmail(auth.currentUser, newEmail);
                await update(ref(db, `users/${currentUser.uid}`), { email: newEmail });
                showToast('✅ تم تحديث البريد'); modal.remove();
            } catch (err) { showToast(err.message, true); }
        };
        document.getElementById('deleteAccountBtn').onclick = async () => {
            if (confirm('⚠️ هل أنت متأكد؟ سيتم حذف حسابك وكل محتواك نهائياً.')) {
                await remove(ref(db, `users/${currentUser.uid}`));
                await remove(ref(db, `posts/${currentUser.uid}`));
                await auth.currentUser.delete();
                showToast('تم حذف حسابك'); location.reload();
            }
        };
    }

    // ========== قائمة الدردشات (تعمل الآن بشكل موثوق) ==========
    async function loadConversationsList() {
        if (!currentUser) return;
        const friendsSnap = await get(ref(db, `friends/${currentUser.uid}`));
        const friends = friendsSnap.val() || {};
        const friendIds = Object.keys(friends).filter(fid => friends[fid] === true || friends[fid]?.status === 'accepted');
        const container = document.getElementById('chatsListContainer');
        if (!container) return;
        if (friendIds.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">✨ أضف أصدقاء لبدء المحادثات ✨</div>';
            return;
        }
        // بناء واجهة المحادثات مع آخر رسالة لكل صديق
        let convosHtml = '';
        for (let fid of friendIds) {
            const friendInfo = await getUserInfo(fid);
            if (!friendInfo) continue;
            const chatId = [currentUser.uid, fid].sort().join('_');
            // جلب آخر رسالة
            const lastMsgQuery = query(ref(db, `chats/${chatId}/messages`), orderByChild('timestamp'), limitToLast(1));
            const lastMsgSnap = await get(lastMsgQuery);
            let lastText = 'ابدأ المحادثة 💬';
            lastMsgSnap.forEach(snap => { lastText = snap.val().text; });
            convosHtml += `
                <div class="chat-conversation-item" data-fid="${fid}">
                    <div><strong>${escapeHtml(friendInfo.name)}</strong><div class="conversation-last-msg">${escapeHtml(lastText)}</div></div>
                    <span class="${friendInfo.online ? 'green-dot' : 'green-dot gray-dot'}"></span>
                </div>`;
        }
        container.innerHTML = convosHtml;
        document.querySelectorAll('.chat-conversation-item').forEach(el => {
            el.addEventListener('click', () => openChatWithFriend(el.dataset.fid));
        });
    }

    async function openChatWithFriend(friendId) {
        if (!currentUser) return;
        // التحقق من الصداقة
        const friendStatus = await get(ref(db, `friends/${currentUser.uid}/${friendId}`));
        if (!friendStatus.exists() || (friendStatus.val() !== true && friendStatus.val()?.status !== 'accepted')) {
            showToast('⚠️ يمكنك المراسلة فقط مع أصدقائك', true);
            return;
        }
        if (unsubscribeCurrentChat) unsubscribeCurrentChat();
        currentChatFriendId = friendId;
        const friendInfo = await getUserInfo(friendId);
        document.getElementById('activeChatFriendName').innerText = friendInfo?.name || 'صديق';
        document.getElementById('chatsListContainer').style.display = 'none';
        document.getElementById('activeChatView').style.display = 'flex';
        const chatId = [currentUser.uid, friendId].sort().join('_');
        const msgsRef = ref(db, `chats/${chatId}/messages`);
        unsubscribeCurrentChat = onValue(msgsRef, (snap) => {
            const msgs = snap.val() || {};
            const arr = Object.entries(msgs).sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
            const container = document.getElementById('privateMessagesContainer');
            container.innerHTML = '';
            if (arr.length === 0) container.innerHTML = '<div style="text-align:center; padding:20px;">✨ ابدأ المحادثة مع صديقك ✨</div>';
            arr.forEach(([k, msg]) => {
                const div = document.createElement('div');
                div.className = `message-bubble ${msg.senderId === currentUser.uid ? 'my-message' : 'their-message'}`;
                div.innerText = msg.text;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });
        document.getElementById('privateChatInputArea').style.display = 'flex';
        document.getElementById('sendPrivateMsgBtn').onclick = async () => {
            const text = document.getElementById('privateMsgInput').value.trim();
            if (!text) return;
            await push(ref(db, `chats/${chatId}/messages`), { senderId: currentUser.uid, text, timestamp: Date.now() });
            document.getElementById('privateMsgInput').value = '';
        };
    }

    function backToChatsList() {
        if (unsubscribeCurrentChat) unsubscribeCurrentChat();
        currentChatFriendId = null;
        document.getElementById('chatsListContainer').style.display = 'block';
        document.getElementById('activeChatView').style.display = 'none';
        loadConversationsList();
    }

    // ========== الأصدقاء والطلبات ==========
    async function loadFriendsAndRequests() {
        if (!currentUser) return;
        const uid = currentUser.uid;
        onValue(ref(db, `friendRequests/${uid}`), async (snap) => {
            const reqs = snap.val() || {};
            const container = document.getElementById('friendRequestsList'); container.innerHTML = '';
            let hasPending = false;
            for (let [rid, r] of Object.entries(reqs)) if (r.status === 'pending') {
                hasPending = true;
                const u = await getUserInfo(rid);
                const div = document.createElement('div'); div.className = 'request-item';
                div.innerHTML = `<span>🤝 ${escapeHtml(u?.name || rid)} يريد صداقتك</span><div class="request-actions"><button class="acceptReq" data-id="${rid}">قبول</button><button class="rejectReq" data-id="${rid}">رفض</button><button class="viewReqProfile" data-id="${rid}" style="background:#2c2c3a;">عرض الملف</button></div>`;
                container.appendChild(div);
                div.querySelector('.acceptReq').onclick = async () => {
                    await update(ref(db, `friends/${uid}/${rid}`), { status: 'accepted', timestamp: serverTimestamp() });
                    await update(ref(db, `friends/${rid}/${uid}`), { status: 'accepted', timestamp: serverTimestamp() });
                    await set(ref(db, `friendRequests/${uid}/${rid}`), null);
                    await set(ref(db, `friendRequests/${rid}/${uid}`), null);
                    showToast(`✅ أصبحت صديقاً مع ${u?.name}`);
                };
                div.querySelector('.rejectReq').onclick = async () => { await set(ref(db, `friendRequests/${uid}/${rid}`), null); showToast('تم رفض الطلب'); };
                div.querySelector('.viewReqProfile').onclick = () => { showUserProfile(rid); document.querySelector('.tab-btn[data-tab="profileTab"]').click(); };
            }
            if (!hasPending) container.innerHTML = '<div style="opacity:0.6;">✨ لا توجد طلبات جديدة</div>';
        });
        onValue(ref(db, `friends/${uid}`), async (snap) => {
            const friends = snap.val() || {};
            const fids = Object.keys(friends).filter(fid => friends[fid] === true || friends[fid]?.status === 'accepted');
            const container = document.getElementById('friendsList'); container.innerHTML = '';
            if (fids.length === 0) { container.innerHTML = '<div style="opacity:0.6;">💫 لا أصدقاء بعد، ابحث وأضف أصدقاء جدد</div>'; return; }
            for (let fid of fids) {
                const info = await getUserInfo(fid);
                const div = document.createElement('div'); div.className = 'friend-item';
                div.innerHTML = `<span><i class="fas fa-user-circle"></i> ${escapeHtml(info?.name)} <span class="${info?.online ? 'green-dot' : 'green-dot gray-dot'}"></span></span>
                                 <div style="display: flex; gap:6px;"><i class="fas fa-comment" style="color:#D4AF37; cursor:pointer;" class="chat-friend"></i><i class="fas fa-user" style="color:#aaa; cursor:pointer;" class="profile-friend"></i></div>`;
                const chatIcon = div.querySelector('.fa-comment'); chatIcon.onclick = (e) => { e.stopPropagation(); openChatWithFriend(fid); document.querySelector('.tab-btn[data-tab="chatsTab"]').click(); };
                const profileIcon = div.querySelector('.fa-user'); profileIcon.onclick = (e) => { e.stopPropagation(); showUserProfile(fid); document.querySelector('.tab-btn[data-tab="profileTab"]').click(); };
                container.appendChild(div);
            }
        });
    }

    // البحث عن مستخدمين
    const searchInput = document.getElementById('searchUserInput');
    searchInput.addEventListener('input', async () => {
        const q = searchInput.value.trim().toLowerCase();
        if (q.length < 2) { document.getElementById('searchResults').innerHTML = ''; return; }
        const usersSnap = await get(ref(db, 'users')), users = usersSnap.val() || {};
        const friendsSnap = await get(ref(db, `friends/${currentUser.uid}`)), friends = friendsSnap.val() || {};
        const sentSnap = await get(ref(db, `friendRequests/${currentUser.uid}`)), sent = sentSnap.val() || {};
        let html = '';
        for (let [uid, data] of Object.entries(users)) {
            if (uid === currentUser.uid) continue;
            if (data.name.toLowerCase().includes(q)) {
                const isFriend = friends[uid] && (friends[uid] === true || friends[uid]?.status === 'accepted');
                const isSent = sent[uid] && sent[uid].status === 'pending';
                html += `<div class="search-result-item"><span>${escapeHtml(data.name)}</span>`;
                if (!isFriend) {
                    if (isSent) html += `<button disabled style="background:#555;">✅ تم الإرسال</button>`;
                    else html += `<button class="sendReqBtn" data-id="${uid}" style="background:#D4AF37; border:none; border-radius:20px; padding:4px 12px;">➕ أضف صديقاً</button>`;
                } else html += `<span>صديقك 🫂</span>`;
                html += `<button class="viewProfileSearch" data-id="${uid}" style="background:#2c2c3a; border:none; border-radius:20px; padding:4px 12px;">👤 ملف</button></div>`;
            }
        }
        document.getElementById('searchResults').innerHTML = html || '<div style="opacity:0.6;">لا توجد نتائج</div>';
        document.querySelectorAll('.sendReqBtn').forEach(btn => {
            btn.onclick = async () => {
                const targetId = btn.getAttribute('data-id');
                await set(ref(db, `friendRequests/${targetId}/${currentUser.uid}`), { from: currentUser.uid, fromName: currentUser.displayName, status: 'pending', timestamp: serverTimestamp() });
                btn.innerText = '✅ تم الإرسال'; btn.disabled = true;
                showToast('✨ تم إرسال طلب الصداقة');
            };
        });
        document.querySelectorAll('.viewProfileSearch').forEach(btn => {
            btn.onclick = () => { showUserProfile(btn.dataset.id); document.querySelector('.tab-btn[data-tab="profileTab"]').click(); };
        });
    });

    // عرض الملف الشخصي مع الأصدقاء بشكل أفقي (كروت)
    async function showUserProfile(uid) {
        const user = await getUserInfo(uid);
        if (!user) return;
        // جلب قائمة الأصدقاء
        const friendsSnap = await get(ref(db, `friends/${uid}`));
        const friendsMap = friendsSnap.val() || {};
        const friendIds = Object.keys(friendsMap).filter(fid => friendsMap[fid] === true || friendsMap[fid]?.status === 'accepted');
        let friendsHtml = '<div class="friends-horizontal-scroll">';
        for (let fid of friendIds) {
            const f = await getUserInfo(fid);
            if (f) {
                friendsHtml += `
                    <div class="friend-card" data-fid="${fid}">
                        <div class="friend-card-avatar">${f.avatar || '👤'}</div>
                        <div class="friend-card-name">${escapeHtml(f.name)}</div>
                    </div>`;
            }
        }
        friendsHtml += '</div>';
        if (friendIds.length === 0) friendsHtml = '<div style="opacity:0.6; text-align:center;">لا يوجد أصدقاء بعد</div>';
        
        const isOwnProfile = (uid === currentUser.uid);
        const container = document.getElementById('profileContainer');
        container.innerHTML = `
            <div class="profile-header"><div class="profile-avatar" style="width:80px; height:80px; font-size:2.5rem;">${user.avatar || '👤'}</div><div><h2>${escapeHtml(user.name)}</h2>${!isOwnProfile ? '<button id="sendMsgFromProfile" class="edit-profile" style="margin-top:8px;"><i class="fas fa-comment"></i> مراسلة</button>' : '<button id="editBioBtn" class="edit-profile">✏️ تعديل السيرة</button>'}</div></div>
            <div class="profile-bio"><strong>📝 عني:</strong><br> ${escapeHtml(user.bio || 'مرحباً! أنا سعيد بوجودي في ونـسة بزنس.')}</div>
            <div class="section-title">👥 أصدقائي (${friendIds.length})</div>
            ${friendsHtml}
            <div class="section-title">📝 منشورات ${isOwnProfile ? 'ي' : user.name}</div>
            <div id="userPostsList"></div>
        `;
        // إضافة حدث النقر على بطاقات الأصدقاء
        document.querySelectorAll('.friend-card').forEach(card => {
            card.addEventListener('click', () => {
                const fid = card.dataset.fid;
                if (fid) showUserProfile(fid);
            });
        });
        if (!isOwnProfile) {
            document.getElementById('sendMsgFromProfile')?.addEventListener('click', async () => {
                const isFriend = await get(ref(db, `friends/${currentUser.uid}/${uid}`));
                if (!isFriend.exists() || (isFriend.val() !== true && isFriend.val()?.status !== 'accepted')) return showToast('⚠️ يمكنك المراسلة فقط بعد أن تصبحا أصدقاء', true);
                openChatWithFriend(uid);
                document.querySelector('.tab-btn[data-tab="chatsTab"]').click();
            });
        } else {
            document.getElementById('editBioBtn')?.addEventListener('click', async () => {
                const newBio = prompt('✏️ عدل سيرتك الذاتية:', user.bio || '');
                if (newBio !== null) { await update(ref(db, `users/${uid}`), { bio: newBio }); showToast('✅ تم تحديث السيرة'); showUserProfile(uid); }
            });
        }
        // تحميل المنشورات
        const postsSnap = await get(ref(db, `posts/${uid}`));
        const posts = postsSnap.val() || {};
        const postsDiv = container.querySelector('#userPostsList'); postsDiv.innerHTML = '';
        for (let [pid, p] of Object.entries(posts).sort((a,b)=>b[1].timestamp - a[1].timestamp)) {
            const div = document.createElement('div'); div.className = 'post-item';
            div.innerHTML = `<div class="post-text">${escapeHtml(p.text)}</div>${p.imageUrl ? `<img src="${escapeHtml(p.imageUrl)}" class="post-image" onclick="window.showImageModal(this.src)">` : ''}<div class="post-actions"><span><i class="fas fa-thumbs-up"></i> ${Object.keys(p.likes||{}).length}</span><span><i class="fas fa-thumbs-down"></i> ${Object.keys(p.dislikes||{}).length}</span></div>`;
            if (isOwnProfile) div.innerHTML += `<button class="delete-post" data-pid="${pid}" data-uid="${uid}" style="margin-top:8px;"><i class="fas fa-trash-alt"></i> حذف المنشور</button>`;
            postsDiv.appendChild(div);
            if (isOwnProfile) div.querySelector('.delete-post')?.addEventListener('click', async () => { await remove(ref(db, `posts/${uid}/${pid}`)); showUserProfile(uid); });
        }
    }

    // تغذية المنشورات
    async function loadFeed() {
        if (!currentUser) return;
        const friendsSnap = await get(ref(db, `friends/${currentUser.uid}`));
        const friends = friendsSnap.val() || {};
        const friendIds = Object.keys(friends).filter(fid => friends[fid] === true || friends[fid]?.status === 'accepted');
        const userIds = [currentUser.uid, ...friendIds];
        let allPosts = [];
        for (let uid of userIds) {
            const postsSnap = await get(ref(db, `posts/${uid}`));
            const posts = postsSnap.val() || {};
            const userInfo = await getUserInfo(uid);
            for (let [pid, p] of Object.entries(posts)) {
                const likesCount = p.likes ? Object.keys(p.likes).length : 0;
                const dislikesCount = p.dislikes ? Object.keys(p.dislikes).length : 0;
                const score = (likesCount * 2) + (p.timestamp / 1000000000000);
                allPosts.push({ id: pid, uid, userName: userInfo?.name, userAvatar: userInfo?.avatar || '👤', text: p.text, imageUrl: p.imageUrl, timestamp: p.timestamp, likesCount, dislikesCount, score, myLike: p.likes?.[currentUser.uid] || false, myDislike: p.dislikes?.[currentUser.uid] || false });
            }
        }
        allPosts.sort((a, b) => b.score - a.score);
        const container = document.getElementById('allFeedPosts'); container.innerHTML = '';
        if (allPosts.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px;">📝 لا توجد منشورات بعد، كن أول من يشارك!</div>'; return; }
        for (let post of allPosts) {
            const div = document.createElement('div'); div.className = 'post-item';
            div.innerHTML = `
                <div class="post-header"><div class="post-avatar">${post.userAvatar}</div><div><span class="post-name" data-uid="${post.uid}">${escapeHtml(post.userName)}</span><div class="post-time">${new Date(post.timestamp).toLocaleString()}</div></div></div>
                <div class="post-text">${escapeHtml(post.text)}</div>
                ${post.imageUrl ? `<img src="${escapeHtml(post.imageUrl)}" class="post-image" onclick="window.showImageModal(this.src)">` : ''}
                <div class="post-actions">
                    <button class="likeBtn ${post.myLike ? 'liked' : ''}" data-uid="${post.uid}" data-pid="${post.id}"><i class="fas fa-thumbs-up"></i> ${post.likesCount}</button>
                    <button class="dislikeBtn ${post.myDislike ? 'disliked' : ''}" data-uid="${post.uid}" data-pid="${post.id}"><i class="fas fa-thumbs-down"></i> ${post.dislikesCount}</button>
                    ${post.uid === currentUser.uid ? `<button class="delete-post" data-uid="${post.uid}" data-pid="${post.id}"><i class="fas fa-trash-alt"></i> حذف</button>` : ''}
                </div>
            `;
            container.appendChild(div);
            div.querySelector('.post-name')?.addEventListener('click', () => { showUserProfile(post.uid); document.querySelector('.tab-btn[data-tab="profileTab"]').click(); });
            div.querySelector('.likeBtn')?.addEventListener('click', async () => {
                const likeRef = ref(db, `posts/${post.uid}/${post.id}/likes/${currentUser.uid}`);
                const dislikeRef = ref(db, `posts/${post.uid}/${post.id}/dislikes/${currentUser.uid}`);
                const likeSnap = await get(likeRef);
                if (likeSnap.exists()) await remove(likeRef);
                else { const disSnap = await get(dislikeRef); if (disSnap.exists()) await remove(dislikeRef); await set(likeRef, true); }
                loadFeed();
            });
            div.querySelector('.dislikeBtn')?.addEventListener('click', async () => {
                const dislikeRef = ref(db, `posts/${post.uid}/${post.id}/dislikes/${currentUser.uid}`);
                const likeRef = ref(db, `posts/${post.uid}/${post.id}/likes/${currentUser.uid}`);
                const dislikeSnap = await get(dislikeRef);
                if (dislikeSnap.exists()) await remove(dislikeRef);
                else { const likeSnap = await get(likeRef); if (likeSnap.exists()) await remove(likeRef); await set(dislikeRef, true); }
                loadFeed();
            });
            if (post.uid === currentUser.uid) div.querySelector('.delete-post')?.addEventListener('click', async () => { await remove(ref(db, `posts/${post.uid}/${post.id}`)); loadFeed(); });
        }
    }

    document.getElementById('publishGlobalPost').onclick = async () => {
        const text = document.getElementById('globalPostContent').value.trim();
        const img = document.getElementById('globalPostImageUrl').value.trim();
        if (!text) return showToast('✨ اكتب محتوى منشورك أولاً', true);
        if (img && !isValidImageUrl(img)) return showToast('❌ الروابط مسموحة فقط من فيسبوك (facebook.com أو fbcdn.net)', true);
        await push(ref(db, `posts/${currentUser.uid}`), { text, imageUrl: img || null, timestamp: Date.now(), likes: {}, dislikes: {} });
        document.getElementById('globalPostContent').value = ''; document.getElementById('globalPostImageUrl').value = '';
        showToast('🎉 تم نشر المنشور بنجاح');
        if (document.querySelector('.tab-btn[data-tab="feedTab"]').classList.contains('active')) loadFeed();
    };
    window.showImageModal = (src) => { const modal = document.createElement('div'); modal.className = 'image-modal'; modal.innerHTML = `<img src="${src}" style="max-width:90%; max-height:90%; border-radius:20px;">`; modal.onclick = () => modal.remove(); document.body.appendChild(modal); };

    // تبديل التبويبات
    const tabs = { feedTab: document.getElementById('feedTab'), profileTab: document.getElementById('profileTab'), chatsTab: document.getElementById('chatsTab') };
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        Object.keys(tabs).forEach(t => tabs[t].classList.remove('active-tab'));
        tabs[btn.getAttribute('data-tab')].classList.add('active-tab');
        if (btn.getAttribute('data-tab') === 'feedTab') loadFeed();
        if (btn.getAttribute('data-tab') === 'profileTab') showUserProfile(currentUser.uid);
        if (btn.getAttribute('data-tab') === 'chatsTab') { loadConversationsList(); backToChatsList(); }
    }));
    document.getElementById('homeLogo').onclick = () => document.querySelector('.tab-btn[data-tab="feedTab"]').click();
    document.getElementById('sidebarProfileBtn').onclick = () => { showUserProfile(currentUser.uid); document.querySelector('.tab-btn[data-tab="profileTab"]').click(); };
    document.getElementById('backToChatsList')?.addEventListener('click', backToChatsList);

    // مصادقة المستخدم
    let isRegisterMode = false;
    const toggleModeBtn = document.getElementById('toggleAuthMode');
    const actionBtn = document.getElementById('actionBtn');
    const regUsernameInp = document.getElementById('regUsername');
    toggleModeBtn.addEventListener('click', () => {
        isRegisterMode = !isRegisterMode;
        if (isRegisterMode) { actionBtn.innerText = 'إنشاء حساب جديد'; toggleModeBtn.innerText = 'لديك حساب؟ سجل دخول'; regUsernameInp.style.display = 'block'; }
        else { actionBtn.innerText = 'دخول إلى حسابي'; toggleModeBtn.innerText = 'ليس لديك حساب؟ سجل مجاناً'; regUsernameInp.style.display = 'none'; }
    });
    regUsernameInp.style.display = 'none';
    actionBtn.onclick = async () => {
        const email = document.getElementById('authEmail').value.trim();
        const pass = document.getElementById('authPassword').value.trim();
        if (!email || !pass) return showToast('✋ من فضلك املأ البريد وكلمة المرور', true);
        if (isRegisterMode) {
            const username = regUsernameInp.value.trim();
            if (!username) return showToast('اختر اسم مستخدم يعبر عنك', true);
            if (!await isUsernameUnique(username)) return showToast('❌ هذا الاسم مستخدم بالفعل، اختر اسماً آخر', true);
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(cred.user, { displayName: username });
                await set(ref(db, `users/${cred.user.uid}`), { uid: cred.user.uid, email, name: username, avatar: '👤', bio: 'مرحباً، أنا جديد في ونـسة بزنس، متحمس للتواصل!', online: true });
                showToast(`🎉 أهلاً بك ${username}`);
            } catch (err) { showToast(err.message, true); }
        } else {
            try { await signInWithEmailAndPassword(auth, email, pass); } catch (err) { showToast('❌ البريد أو كلمة المرور غير صحيحة', true); }
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            await update(ref(db, `users/${user.uid}`), { online: true, name: user.displayName });
            document.getElementById('currentUserName').innerText = user.displayName + ' 👑';
            document.getElementById('profileName').innerText = user.displayName;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            loadFriendsAndRequests(); loadFeed(); showUserProfile(user.uid); loadConversationsList();
            document.getElementById('logoutBtn').onclick = async () => { await update(ref(db, `users/${user.uid}`), { online: false }); await signOut(auth); location.reload(); };
            window.addEventListener('beforeunload', () => update(ref(db, `users/${user.uid}`), { online: false }));
        } else { document.getElementById('authScreen').style.display = 'flex'; document.getElementById('appContainer').style.display = 'none'; if (unsubscribeCurrentChat) unsubscribeCurrentChat(); }
    });
</script>
</body>
</html>
